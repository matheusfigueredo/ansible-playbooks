- name: Install Zsh
  community.general.homebrew:
    name: zsh
    state: latest

- name: Install Oh-My-Zsh
  ansible.builtin.git:
    repo: https://github.com/ohmyzsh/ohmyzsh.git
    dest: "{{ ansible_env.HOME }}/.oh-my-zsh"
    depth: 1

- name: Set up zsh as default shell
  ansible.builtin.command: chsh -s /bin/zsh "{{ ansible_user_id }}"
  when: ansible_user_shell != "/bin/zsh"

- name: Install powerlevel10k plugin
  ansible.builtin.git:
    repo: https://github.com/romkatv/powerlevel10k.git
    dest: "{{ ansible_env.HOME }}/.powerlevel10k"
    depth: 1

- name: Add powerlevel10k theme to zshrc
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/.zshrc"
    line: "source ~/.powerlevel10k/powerlevel10k.zsh-theme"
    state: present
    create: true
